<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 36" fill="none">
  <!-- Wrench/gear icon -->
  <g transform="translate(2, 2)">
    <!-- Gear outer -->
    <circle cx="16" cy="16" r="14" stroke="#2563eb" stroke-width="2.5" fill="none"/>
    <!-- Gear teeth -->
    <rect x="14" y="0" width="4" height="5" rx="1" fill="#2563eb"/>
    <rect x="14" y="27" width="4" height="5" rx="1" fill="#2563eb"/>
    <rect x="0" y="14" width="5" height="4" rx="1" fill="#2563eb"/>
    <rect x="27" y="14" width="5" height="4" rx="1" fill="#2563eb"/>
    <!-- Gear diagonal teeth -->
    <rect x="5.5" y="4" width="4" height="4" rx="1" fill="#2563eb" transform="rotate(45 7.5 6)"/>
    <rect x="22.5" y="24" width="4" height="4" rx="1" fill="#2563eb" transform="rotate(45 24.5 26)"/>
    <rect x="4" y="22.5" width="4" height="4" rx="1" fill="#2563eb" transform="rotate(45 6 24.5)"/>
    <rect x="24" y="5.5" width="4" height="4" rx="1" fill="#2563eb" transform="rotate(45 26 7.5)"/>
    <!-- Wrench inside -->
    <path d="M11 11 L21 21 M19 11 L21 13 L13 21 L11 19 Z" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Circuit dots -->
    <circle cx="16" cy="16" r="2.5" fill="#2563eb"/>
  </g>
  <!-- Text -->
  <text x="42" y="25" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="700" fill="currentColor">
    <tspan fill="#2563eb">Repair</tspan><tspan fill="currentColor">Ops</tspan>
  </text>
</svg>
